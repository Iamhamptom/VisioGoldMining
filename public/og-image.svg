<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECCC74"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#B8960E"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#030712"/>
  <circle cx="800" cy="315" r="250" fill="url(#glow)"/>
  <circle cx="800" cy="315" r="180" stroke="#D4AF37" stroke-width="0.5" opacity="0.2" fill="none"/>
  <circle cx="800" cy="315" r="220" stroke="#D4AF37" stroke-width="0.3" opacity="0.1" fill="none"/>
  <!-- VG Logo -->
  <rect x="100" y="220" width="80" height="80" rx="4" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.5" transform="rotate(45 140 260)"/>
  <rect x="112" y="232" width="56" height="56" rx="4" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.2" transform="rotate(45 140 260)"/>
  <text x="140" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="bold" font-size="28" fill="#D4AF37">VG</text>
  <!-- Title -->
  <text x="100" y="360" font-family="system-ui, sans-serif" font-weight="300" font-size="64" fill="white" letter-spacing="12">VISIO</text>
  <text x="420" y="360" font-family="system-ui, sans-serif" font-weight="bold" font-size="64" fill="url(#gold-grad)" letter-spacing="12">GOLD</text>
  <!-- Subtitle -->
  <text x="100" y="400" font-family="system-ui, sans-serif" font-weight="400" font-size="18" fill="#888888" letter-spacing="4">AI-POWERED MINING INTELLIGENCE</text>
  <!-- DRC Badge -->
  <rect x="100" y="430" width="100" height="28" rx="14" fill="none" stroke="#D4AF37" stroke-width="0.5" opacity="0.4"/>
  <text x="150" y="449" text-anchor="middle" font-family="monospace" font-size="11" fill="#D4AF37" opacity="0.7">DRC</text>
  <!-- Decorative dots -->
  <circle cx="700" cy="200" r="2" fill="#D4AF37" opacity="0.4"/>
  <circle cx="750" cy="180" r="1.5" fill="#D4AF37" opacity="0.3"/>
  <circle cx="850" cy="150" r="2.5" fill="#D4AF37" opacity="0.5"/>
  <circle cx="900" cy="400" r="1.5" fill="#D4AF37" opacity="0.3"/>
  <circle cx="950" cy="350" r="2" fill="#D4AF37" opacity="0.4"/>
  <circle cx="1000" cy="250" r="1" fill="#D4AF37" opacity="0.2"/>
</svg>
